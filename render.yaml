# Render blueprint — deploys FITIZENS as a Docker web service with a
# persistent disk for the SQLite database + uploaded images.
#
# Setup: push to GitHub → Render dashboard → New → Blueprint → pick this repo.
# Render prompts for the sync:false env vars on first deploy.
#
# Note: the disk requires a paid instance (Starter). With a disk attached the
# service runs as a single instance — correct for SQLite.
services:
  - type: web
    name: fitizens
    runtime: docker
    plan: starter
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: fitizens-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      # Admin login — created automatically on first boot.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Canonical site URL (e.g. https://fitizens.in) for SEO + receipts.
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      # Optional — email (leads/receipts log to console until set).
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: LEAD_TO_EMAIL
        sync: false
      # Optional — Razorpay (pay buttons show "coming soon" until set).
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
